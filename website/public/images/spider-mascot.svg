<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Body glow -->
  <defs>
    <radialGradient id="bodyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4040" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff4040" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ff6050"/>
      <stop offset="50%" stop-color="#ee3030"/>
      <stop offset="100%" stop-color="#cc1818"/>
    </radialGradient>
    <radialGradient id="eyeGrad" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#88ddff"/>
      <stop offset="100%" stop-color="#2299dd"/>
    </radialGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="100" cy="100" r="90" fill="url(#bodyGlow)"/>

  <!-- Legs -->
  <g stroke="#cc2020" stroke-width="4" stroke-linecap="round" fill="none">
    <!-- Left legs -->
    <path d="M75 90 Q50 70 30 55" />
    <path d="M72 100 Q45 90 20 85" />
    <path d="M72 110 Q45 115 20 120" />
    <path d="M75 118 Q55 135 35 150" />
    <!-- Right legs -->
    <path d="M125 90 Q150 70 170 55" />
    <path d="M128 100 Q155 90 180 85" />
    <path d="M128 110 Q155 115 180 120" />
    <path d="M125 118 Q145 135 165 150" />
  </g>

  <!-- Leg tips (feet) -->
  <g fill="#ff5040">
    <circle cx="30" cy="55" r="3"/>
    <circle cx="20" cy="85" r="3"/>
    <circle cx="20" cy="120" r="3"/>
    <circle cx="35" cy="150" r="3"/>
    <circle cx="170" cy="55" r="3"/>
    <circle cx="180" cy="85" r="3"/>
    <circle cx="180" cy="120" r="3"/>
    <circle cx="165" cy="150" r="3"/>
  </g>

  <!-- Body (abdomen) -->
  <ellipse cx="100" cy="115" rx="32" ry="28" fill="url(#bodyGrad)" />
  <!-- Body stripe -->
  <ellipse cx="100" cy="115" rx="22" ry="18" fill="none" stroke="#ff6050" stroke-width="1.5" opacity="0.4"/>

  <!-- Head -->
  <circle cx="100" cy="85" r="28" fill="url(#bodyGrad)" />

  <!-- Head highlight -->
  <ellipse cx="93" cy="78" rx="10" ry="7" fill="#ff7060" opacity="0.5"/>

  <!-- Eyes -->
  <circle cx="88" cy="82" r="10" fill="#1a1a2e" />
  <circle cx="112" cy="82" r="10" fill="#1a1a2e" />
  <circle cx="88" cy="82" r="7" fill="url(#eyeGrad)" />
  <circle cx="112" cy="82" r="7" fill="url(#eyeGrad)" />
  <!-- Eye highlights -->
  <circle cx="85" cy="79" r="3" fill="white" opacity="0.8"/>
  <circle cx="109" cy="79" r="3" fill="white" opacity="0.8"/>

  <!-- Smile -->
  <path d="M92 92 Q100 98 108 92" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>

  <!-- Fangs/horn (small cute ones) -->
  <path d="M88 68 Q85 60 88 58" fill="none" stroke="#ff5040" stroke-width="3" stroke-linecap="round"/>
  <path d="M112 68 Q115 60 112 58" fill="none" stroke="#ff5040" stroke-width="3" stroke-linecap="round"/>
</svg>
